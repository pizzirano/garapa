services:

  redis:
    image: redis:7-alpine
    container_name: pkos_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - pkos_net


  postgres:
    image: postgres:16-alpine
    container_name: pkos_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - pkos_net


  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: pkos_anythingllm

    restart: unless-stopped

    ports:
      - "3001:3001"

    env_file:
      - .env

    volumes:
      - anythingllm_data:/app/storage

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - pkos_net


  gateway:
    build:
      context: ./gateway-go

    container_name: pkos_gateway

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8080:8080"

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - pkos_net


  worker:
    build:
      context: ./workers-python

    container_name: pkos_worker

    restart: unless-stopped

    env_file:
      - .env

    depends_on:

      redis:
        condition: service_healthy

      postgres:
        condition: service_healthy

    networks:
      - pkos_net


volumes:

  postgres_data:

  anythingllm_data:

  redis_data:


networks:

  pkos_net:
    driver: bridge