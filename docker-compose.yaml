
services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - ./data/postgres:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - ./data/redis:/data


  listmonk:
    image: listmonk/listmonk:v5.0.2
    container_name: listmonk
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "${LISTMONK_PORT}:9000"

    environment:
      LISTMONK_app__address: 0.0.0.0:9000

      LISTMONK_db__host: ${LISTMONK_DB_HOST}
      LISTMONK_db__port: ${LISTMONK_DB_PORT}
      LISTMONK_db__user: ${LISTMONK_DB_USER}
      LISTMONK_db__password: ${LISTMONK_DB_PASSWORD}
      LISTMONK_db__dbname: ${LISTMONK_DB_NAME}
      LISTMONK_db__ssl_mode: disable

    command: >
      sh -c "
      ./listmonk --install --yes &&
      ./listmonk
      "

    volumes:
      - ./data/listmonk:/listmonk/uploads

